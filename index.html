<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Космический тап — кликер для VK</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            touch-action: manipulation;
        }
        .game-container {
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
        }
        .game {
            text-align: center;
            padding: 20px;
            background: #0f3460;
            border-radius: 50px;
            box-shadow: inset 0 0 10px #00000030, 0 10px 20px rgba(0,0,0,0.2);
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            color: #ffd966;
            text-shadow: 2px 2px 0 #b45309;
        }
        .score-board {
            background: #00000080;
            border-radius: 60px;
            padding: 12px 20px;
            margin: 15px 10px;
            backdrop-filter: blur(4px);
        }
        .score-value {
            font-size: 3.2rem;
            font-weight: bold;
            color: #f9f871;
            text-shadow: 0 0 5px #ffaa00;
            margin: 5px 0;
        }
        .click-btn {
            background: radial-gradient(circle at 30% 20%, #ffb347, #ff6b35);
            width: 220px;
            height: 220px;
            border-radius: 50%;
            margin: 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 20px 25px -8px black, inset 0 -5px 0 #a04010;
            transition: transform 0.05s linear;
        }
        .click-btn:active {
            transform: scale(0.96);
        }
        .coin-icon {
            font-size: 5rem;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.5));
        }
        .boost-panel {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 25px;
        }
        .boost {
            background: #2c2c54;
            padding: 10px;
            border-radius: 30px;
            flex: 1;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #12122c;
        }
        .boost:active {
            transform: translateY(2px);
        }
        .boost-name {
            font-weight: bold;
            color: #ffb347;
        }
        .boost-price {
            font-size: 0.9rem;
            color: #ffd966;
            font-weight: bold;
        }
        .reset-btn {
            background: #3a2c2c;
            border: none;
            color: #ffaaaa;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 20px;
        }
        footer {
            margin-top: 12px;
            font-size: 0.7rem;
            color: #aaa;
        }
    </style>
    <!-- Подключаем VK Bridge -->
    <script src="https://vk.com/js/api/xd_connection.js?2"></script>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
<div class="game-container">
    <div class="game">
        <h1>🚀 КОСМОКЛИКЕР</h1>
        <div class="score-board">
            <div class="score-value" id="scoreDisplay">0</div>
        </div>
        <div class="click-btn" id="clickButton">
            <div class="coin-icon">💎</div>
        </div>
        <div class="boost-panel">
            <div class="boost" id="boostDouble">
                <div class="boost-name">✨ Удвоитель</div>
                <div class="boost-price" id="doublePrice">50</div>
            </div>
            <div class="boost" id="boostAuto">
                <div class="boost-name">🤖 Автокликер</div>
                <div class="boost-price" id="autoPrice">100</div>
            </div>
        </div>
        <button class="reset-btn" id="resetBtn">🔄 Сброс</button>
        <footer>Тапай по 💎</footer>
    </div>
</div>
<script>
    // Инициализация VK Bridge
    if (typeof vkBridge !== 'undefined') {
        vkBridge.send('VKWebAppInit', {});
        console.log('VK Bridge initialized');
    } else {
        console.warn('VK Bridge not loaded');
    }

    let coins = 0;
    let clickPower = 1;
    let autoIncome = 0;
    let autoInterval = null;
    let doublePrice = 50;
    let autoPrice = 100;

    const scoreDisplay = document.getElementById('scoreDisplay');
    const clickButton = document.getElementById('clickButton');
    const boostDouble = document.getElementById('boostDouble');
    const boostAuto = document.getElementById('boostAuto');
    const resetBtn = document.getElementById('resetBtn');
    const doublePriceSpan = document.getElementById('doublePrice');
    const autoPriceSpan = document.getElementById('autoPrice');

    function updateUI() {
        scoreDisplay.innerText = Math.floor(coins);
        doublePriceSpan.innerText = doublePrice;
        autoPriceSpan.innerText = autoPrice;
    }
    function saveGame() {
        localStorage.setItem('clickerSaveVK', JSON.stringify({coins,clickPower,autoIncome,doublePrice,autoPrice}));
    }
    function loadGame() {
        const raw = localStorage.getItem('clickerSaveVK');
        if(raw) {
            const s = JSON.parse(raw);
            coins = s.coins; clickPower = s.clickPower; autoIncome = s.autoIncome; doublePrice = s.doublePrice; autoPrice = s.autoPrice;
            if(autoIncome>0 && !autoInterval) startAutoClicker();
            updateUI();
        }
    }
    function startAutoClicker() {
        if(autoInterval) clearInterval(autoInterval);
        autoInterval = setInterval(()=>{ if(autoIncome>0){ coins+=autoIncome; updateUI(); saveGame(); } },1000);
    }
    clickButton.onclick = ()=>{
        coins += clickPower;
        updateUI();
        saveGame();
        clickButton.style.transform = 'scale(0.95)';
        setTimeout(()=>clickButton.style.transform='',80);
    };
    boostDouble.onclick = ()=>{
        if(coins>=doublePrice){ coins-=doublePrice; clickPower++; doublePrice = Math.floor(doublePrice*1.8); updateUI(); saveGame(); }
    };
    boostAuto.onclick = ()=>{
        if(coins>=autoPrice){ coins-=autoPrice; autoIncome++; autoPrice = Math.floor(autoPrice*1.7); updateUI(); saveGame(); if(autoIncome===1) startAutoClicker(); }
    };
    resetBtn.onclick = ()=>{
        if(confirm('Сбросить прогресс?')){ coins=0; clickPower=1; autoIncome=0; doublePrice=50; autoPrice=100; if(autoInterval) clearInterval(autoInterval); autoInterval=null; updateUI(); saveGame(); }
    };
    loadGame();
    if(autoIncome>0 && !autoInterval) startAutoClicker();
</script>
</body>
</html>
